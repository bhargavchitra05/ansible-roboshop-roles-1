- name: install python
  ansible.builtin.dnf:
      name: "{{ item }}"
      state: present
  loop:
    - python3 
    - gcc 
    - python3-devel
    
- name: install dependencie
  ansible.builtin.pip:
      requirements: requirements.txt
      executable: pip3.9
      args:
      chdir: /app

- name: copy payment service
  ansible.builtin.template:
      src: payment.service
      dest: /etc/systemd/system/payment.service

- name: daemon reload
  ansible.builtin.systemd_service:
      daemon_reload: true

- name: start enable payment
  ansible.builtin.service:
      name: payment
      state: restarted
      enabled: yes